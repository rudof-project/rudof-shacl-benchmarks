# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: 3

includes:
  bench:
    taskfile: tasks/bench.yml
    dir: .
  engines:
    taskfile: tasks/engines.yml
    dir: engines
  _dataset:
    taskfile: tasks/dataset.yml
    dir: data
    internal: true

# TODO - For some tasks wrap them to allow data generation / engines compilation before runnning them (file check should be enabled on those tasks before)

tasks:
  init:
    # TODO - Prevent init if already done
    desc: Initialize git submodules
    silent: true
    cmd: git submodule update --init --recursive

  dataset:generate:
    desc: Generates the datasets
    silent: true
    cmds:
      # - task: init
      - task: _dataset:generate

  dataset:clean:
    desc: Cleans the generated datasets
    silent: true
    cmds:
      - task: _dataset:clean
