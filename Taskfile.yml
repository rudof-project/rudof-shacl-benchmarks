# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: 3

set: [ errexit ]

includes:
  toolchain:
    taskfile: toolchains/Taskfile.yml
    dir: toolchains
  data:
    taskfile: data/Taskfile.yml
    dir: data
  engine:
    taskfile: engines/Taskfile.yml
    dir: engines
  vars:
    taskfile: taskfiles/vars.yml
    internal: true

tasks:
  results:generate:dir:
    desc: Generates the results folder
    silent: true
    internal: true
    cmd: mkdir -p results/dist/{{ if eq 1 (len .DATASETS) }}{{ index .DATASETS 0 }}{{ else }}{ {{- .DATASETS | join "," -}} }{{ end }}

  results:generate:
    desc: Generates plots and report from benchmark results
    silent: true
    cmd: |
      docker run \
        --rm \
        -v {{ .TASK_DIR }}:{{ .DKR_WKD }} \
        -w {{ .DKR_WKD }}/results/generator \
        --user {{ .UID }}:{{ .GID }} \
        --entrypoint {{ .DKR_SH_PYTHON }} \
        {{ .DKR_BUILDER_PYTHON }} \
        main.py

  results:clean:
    desc: Cleans the results
    silent: true
    deps:
      - task: results:clean:criterion
      - task: results:clean:engines

  results:clean:criterion:
    desc: Cleans the Criterion results
    silent: true
    cmd: rm -rf target/criterion

  results:clean:engines:
    desc: Cleans the engines results
    silent: true
    cmd: rm -rf results/dist

  docker:rudof:bench:
    desc: Runs the rudof engine benchmarks in Docker
    silent: true
    cmds:
      - for: { var: DATASETS }
        task: "docker:rudof:bench:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "Criterion benchmarks completed"
          MESSAGE: "The criterion benchmarks have been completed. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:rudof:bench:*:
    desc: Runs the rudof engine benchmarks in Docker for the specified dataset
    silent: true
    cmd: |
      docker run \
        --rm \
        --network=host \
        -v {{ .TASK_DIR }}:{{ .TASK_DIR }} \
        -v {{ .DKR_SOCKET }}:/var/run/docker.sock \
        -v {{ .HOME }}/.cache:{{ .HOME }}/.cache \
        -w {{ .TASK_DIR }} \
        --entrypoint {{ .DKR_SH_CARGO }} \
        --user {{ .UID }}:{{ .GID }} \
        --group-add {{ .DKR_GID }} \
        -e RUDOF_BENCH_CFG={{ .RUDOF_BENCH_CFG }} \
        -e RUDOF_BENCH_QLEVER_CFG={{ .RUDOF_BENCH_QLEVER_CFG }} \
        -e HOME={{ .HOME }} \
        {{ .DKR_BUILDER_RUST }} \
        bench --bench={{ index .MATCH 0 }} --message-format=json

  docker:rudof:prof:
    desc: Runs the rudof engine profiler in Docker
    silent: true
    cmds:
      - for: { var: DATASETS }
        task: "docker:rudof:prof:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "Profiling completed"
          MESSAGE: "The rudof profiler has finished. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:rudof:prof:*:
    desc: Runs the rudof engine profiler in Docker for the specified dataset
    silent: true
    cmd: |
      docker run \
      --rm \
      --network=host \
      -v {{ .TASK_DIR }}:{{ .TASK_DIR }} \
      -v {{ .DKR_SOCKET }}:/var/run/docker.sock \
      -v {{ .HOME }}/.cache:{{ .HOME }}/.cache \
      -w {{ .TASK_DIR }} \
      --entrypoint {{ .DKR_SH_CARGO }} \
      --user {{ .UID }}:{{ .GID }} \
      --group-add {{ .DKR_GID }} \
      -e RUDOF_BENCH_CFG={{ .RUDOF_BENCH_CFG }} \
      -e RUDOF_BENCH_QLEVER_CFG={{ .RUDOF_BENCH_QLEVER_CFG }} \
      -e HOME={{ .HOME }} \
      {{ .DKR_BUILDER_RUST }} \
      bench --bench={{ index .MATCH 0 }} --message-format=json -- --profile-time {{ .PROFILE_TIME }}

  docker:engine:bench:
    desc: Runs the all engines in Docker
    silent: true
    cmds:
      - for: { var: ENGINES }
        task: "docker:engine:bench:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "Benchmarks completed"
          MESSAGE: "Benchmarks have been completed for **all configured engines**. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:engine:bench:lubm:
    desc: Runs the all the engines in Docker for the LUBM dataset
    silent: true
    cmds:
      - for: { var: ENGINES }
        task: "docker:engine:bench:lubm:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "LUBM benchmarks completed"
          MESSAGE: "LUBM benchmarks have been completed for **all configured engines**. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:engine:bench:lubm:*:
    desc: Runs the specified engine in Docker for the LUBM dataset
    silent: true
    deps:
      - task: results:generate:dir
    vars:
      ENGINE: "{{ index .MATCH 0 }}"
    cmds:
      - for: { var: LUBM_IDX }
        cmd: |
          set +e
          timeout --foreground -k 30s {{ .GLOBAL_TIMEOUT }}s docker run \
            --rm \
            -v {{ .RESULTS_FOLDER }}/lubm:/results \
            -v {{ .TASK_DIR }}/data/dist/lubm:{{ .TASK_DIR }}/data/dist/lubm:ro \
            {{- if eq .ENGINE "rudof_qlever" }}
            --network=host \
            -v {{ .DKR_SOCKET }}:/var/run/docker.sock \
            -v {{ .TASK_DIR }}/qlever_config.toml:/qlever_config.toml:ro \
            -v {{ .HOME }}/.cache:{{ .HOME }}/.cache \
            -e RUDOF_BENCH_QLEVER_CFG=/qlever_config.toml \
            -e HOME={{ .HOME }} \
            -e JVM_HEAP={{ .JVM_HEAP }} \
            --group-add {{ .DKR_GID }} \
            {{- end }}
            --user {{ .UID }}:{{ .GID }} \
            rudof/{{ .ENGINE }}:latest \
            {{ .TASK_DIR }}/data/dist/lubm/data-{{ .ITEM }}.nt \
            {{ .LUBM_DATA_FORMAT }} \
            {{ .TASK_DIR }}/data/dist/lubm/shapes.ttl \
            {{ .LUBM_SHAPES_FORMAT }} \
            /results/{{ .ENGINE }}-{{ .ITEM }}.json \
            /results/{{ .ENGINE }}-{{ .ITEM }}.ttl \
            {{ .RUNS }} {{ .WARM_UP }} {{ .TIMEOUT }} {{ .VALID_ITERATIONS }}
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            echo "[TIMEOUT] {{ .ENGINE }} lubm-{{ .ITEM }} exceeded {{ .GLOBAL_TIMEOUT }}s"
          elif [ "$code" -ne 0 ]; then
            exit $code
          fi

  docker:engine:bench:icdd:
    desc: Runs all the engines in Docker for the ICDD dataset
    silent: true
    cmds:
      - for: { var: ENGINES }
        task: "docker:engine:bench:icdd:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "ICDD benchmarks completed"
          MESSAGE: "ICDD benchmarks have been completed for **all configured engines**. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:engine:bench:icdd:*:
    desc: Runs the specified engine in Docker for the ICDD dataset
    silent: true
    deps:
      - task: results:generate:dir
    vars:
      ENGINE: "{{ index .MATCH 0 }}"
    cmds:
      - for:
          matrix:
            TYPES: { ref: .ICDD_TYPES }
            IDX: { ref: .ICDD_IDX }
        cmd: |
          set +e
          timeout --foreground -k 30s {{ .GLOBAL_TIMEOUT }}s docker run \
            --rm \
            -v {{ .RESULTS_FOLDER }}/icdd:/results \
            -v {{ .TASK_DIR }}/data/dist/icdd:{{ .TASK_DIR }}/data/dist/icdd:ro \
            {{- if eq .ENGINE "rudof_qlever" }}
            --network=host \
            -v {{ .DKR_SOCKET }}:/var/run/docker.sock \
            -v {{ .TASK_DIR }}/qlever_config.toml:/qlever_config.toml:ro \
            -v {{ .HOME }}/.cache:{{ .HOME }}/.cache \
            -e RUDOF_BENCH_QLEVER_CFG=/qlever_config.toml \
            -e HOME={{ .HOME }} \
            -e JVM_HEAP={{ .JVM_HEAP }} \
            --group-add {{ .DKR_GID }} \
            {{- end }}
            --user {{ .UID }}:{{ .GID }} \
            rudof/{{ .ENGINE }}:latest \
            {{ .TASK_DIR }}/data/dist/icdd/data-{{ .ITEM.TYPES }}-{{ .ITEM.IDX }}.ttl \
            {{ .ICDD_DATA_FORMAT }} \
            {{ .TASK_DIR }}/data/dist/icdd/shapes-{{ .ITEM.TYPES }}.ttl \
            {{ .ICDD_SHAPES_FORMAT }} \
            /results/{{ .ENGINE }}-{{ .ITEM.TYPES }}-{{ .ITEM.IDX }}.json \
            /results/{{ .ENGINE }}-{{ .ITEM.TYPES }}-{{ .ITEM.IDX }}.ttl \
            {{ .RUNS }} {{ .WARM_UP }} {{ .TIMEOUT }} {{ .VALID_ITERATIONS }}
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            echo "[TIMEOUT] {{ .ENGINE }} icdd-{{ .ITEM.TYPES }}-{{ .ITEM.IDX }} exceeded {{ .GLOBAL_TIMEOUT }}s"
          elif [ "$code" -ne 0 ]; then
            exit $code
          fi

  docker:engine:bench:era:
    desc: Runs all the engines in Docker for the ERA dataset
    silent: true
    cmds:
      - for: { var: ENGINES }
        task: "docker:engine:bench:era:{{ .ITEM }}"
      - if: '[ "{{ .NOTIFY }}" = "true" ]'
        task: "vars:notify"
        vars:
          TITLE: "ERA benchmarks completed"
          MESSAGE: "ERA benchmarks have been completed for **all configured engines**. Now you can check the results"
          TAGS: "tada"
          MARKDOWN: true

  docker:engine:bench:era:*:
    desc: Runs the specified engine in Docker for the ERA dataset
    silent: true
    deps:
      - task: results:generate:dir
    vars:
      ENGINE: "{{ index .MATCH 0 }}"
    cmds:
      - for:
          matrix:
            DATA: { ref: .ERA_DATA }
            SHAPES: { ref: .ERA_SHAPES }
        cmd: |
          set +e
          timeout --foreground -k 30s {{ .GLOBAL_TIMEOUT }}s docker run \
            --rm \
            -v {{ .RESULTS_FOLDER }}/era:/results \
            -v {{ .TASK_DIR }}/data/dist/era:{{ .TASK_DIR }}/data/dist/era:ro \
            {{- if eq .ENGINE "rudof_qlever" }}
            --network=host \
            -v {{ .DKR_SOCKET }}:/var/run/docker.sock \
            -v {{ .TASK_DIR }}/qlever_config.toml:/qlever_config.toml:ro \
            -v {{ .HOME }}/.cache:{{ .HOME }}/.cache \
            -e RUDOF_BENCH_QLEVER_CFG=/qlever_config.toml \
            -e HOME={{ .HOME }} \
            -e JVM_HEAP={{ .JVM_HEAP }} \
            --group-add {{ .DKR_GID }} \
            {{- end }}
            --user {{ .UID }}:{{ .GID }} \
            rudof/{{ .ENGINE }}:latest \
            {{ .TASK_DIR }}/data/dist/era/{{ .ITEM.DATA }}-data.ttl \
            {{ .ERA_DATA_FORMAT }} \
            {{ .TASK_DIR }}/data/dist/era/{{ .ITEM.SHAPES }}-shapes.ttl \
            {{ .ERA_SHAPES_FORMAT }} \
            /results/{{ .ENGINE }}-{{ .ITEM.DATA }}-{{ .ITEM.SHAPES }}.json \
            /results/{{ .ENGINE }}-{{ .ITEM.DATA }}-{{ .ITEM.SHAPES }}.ttl \
            {{ .RUNS }} {{ .WARM_UP }} {{ .TIMEOUT }} {{ .VALID_ITERATIONS }}
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            echo "[TIMEOUT] {{ .ENGINE }} era-{{ .ITEM.DATA }}-{{ .ITEM.SHAPES }} exceeded {{ .GLOBAL_TIMEOUT }}s"
          elif [ "$code" -ne 0 ]; then
            exit $code
          fi

  docker:engine:bench:*:
    desc: Runs the specified engine in Docker
    silent: true
    vars:
      ENGINE: "{{ index .MATCH 0 }}"
    cmds:
      - for: { var: DATASETS }
        task: "docker:engine:bench:{{ .ITEM }}:{{ .ENGINE }}"
