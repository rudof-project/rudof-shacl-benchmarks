# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: 3

vars:
  DOCKER_IMAGE: rudof/dataset_builder:latest
  DOCKER_WKD: /app
  DOCKER_SH: /toolchain/bin/bash
  UID:
    sh: id -u
  GID:
    sh: id -g
  DATASETS: [ era, lubm, icdd ]

tasks:
  docker:generate:
    desc: Generates all datasets using Docker.
    silent: true
    deps:
      - for: { var: DATASETS }
        task: docker:generate:{{ .ITEM }}

  docker:generate:*:
    desc: Generates the given dataset using Docker.
    silent: true
    cmd: >
      docker run \
        --rm \
        -v {{ .TASK_DIR }}:{{ .DOCKER_WKD }} \
        -w {{ .DOCKER_WKD }} \
        --entrypoint {{ .DOCKER_SH }} \
        --user {{ .UID }}:{{ .GID }} \
        --detach \
        {{ .DOCKER_IMAGE }} \
        {{ index .MATCH 0 }}_entrypoint.sh
